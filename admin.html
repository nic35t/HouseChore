<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>시스템 관리자 - HouseChore</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css" />
    <style>body { font-family: 'Pretendard Variable', sans-serif; background-color: #f8fafc; } .tab-btn.active { background-color: #f1f5f9; color: #0f172a; border-left: 4px solid #f97316; font-weight: bold; }</style>
</head>
<body class="flex h-screen overflow-hidden">
    <aside class="w-64 bg-white border-r border-slate-200 flex flex-col z-20">
        <div class="p-8 border-b border-slate-50"><h1 class="text-xl font-black text-slate-900 tracking-tighter">⚙️ Admin</h1></div>
        <nav class="flex-1 py-6 flex flex-col gap-1">
            <button onclick="switchTab('export')" id="tab-export" class="tab-btn active px-6 py-3.5 text-slate-500 hover:bg-slate-50 text-left w-full text-sm">📊 Export Data</button>
            <button onclick="switchTab('rules')" id="tab-rules" class="tab-btn px-6 py-3.5 text-slate-500 hover:bg-slate-50 text-left w-full text-sm">🤖 AI Rules</button>
            <div class="mt-auto p-6 border-t border-slate-50"><a href="index.html" class="text-xs font-bold text-orange-500 hover:underline">← Home</a></div>
        </nav>
    </aside>
    <main class="flex-1 overflow-y-auto bg-[#f8fafc] relative">
        <div id="toast" class="fixed top-5 left-1/2 -translate-x-1/2 bg-white/80 backdrop-blur-md border border-slate-200 px-6 py-3 rounded-full shadow-lg opacity-0 pointer-events-none z-50 text-sm font-bold">✅ 완료</div>
        <section id="sec-export" class="max-w-4xl mx-auto p-12 h-full flex flex-col justify-center text-center">
            <div class="bg-white p-12 rounded-[2.5rem] shadow-sm border border-slate-100">
                <div class="text-4xl mb-6">📥</div><h2 class="text-2xl font-black text-slate-900 mb-2">기록 추출</h2>
                <button id="btnExport" class="bg-slate-900 text-white font-bold py-4 px-12 rounded-2xl">CSV Download</button>
            </div>
        </section>
        <section id="sec-rules" class="max-w-5xl mx-auto p-12 hidden pb-24">
            <div class="flex justify-between items-end sticky top-0 bg-[#f8fafc]/95 py-4 z-10 border-b border-slate-100 mb-8">
                <h2 class="text-2xl font-black text-slate-900">AI 자동완성 규칙</h2>
                <button id="btnSaveRules" class="bg-orange-600 text-white font-bold py-2.5 px-8 rounded-xl shadow-lg">저장하기</button>
            </div>
            <div id="rulesList" class="space-y-4"></div>
            <button onclick="window.admin.addRule()" class="w-full mt-4 py-4 border-2 border-dashed border-slate-200 rounded-2xl text-slate-400 font-bold">+ 새 규칙 추가</button>
        </section>
    </main>
    <script src="firebase-config.js"></script>
    <script type="module" src="admin.js"></script>
    <script>window.switchTab = (id) => { ['export', 'rules'].forEach(t => { document.getElementById('sec-'+t).classList.toggle('hidden', t !== id); document.getElementById('tab-'+t).classList.toggle('active', t === id); }); };</script>
</body>
</html>
