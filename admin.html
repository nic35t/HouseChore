<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>시스템 관리자 - HouseChore</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css" />
    <style>
        body { font-family: 'Pretendard Variable', sans-serif; background-color: #f8fafc; }
        .tab-btn.active { background-color: #f1f5f9; color: #0f172a; border-left: 4px solid #f97316; font-weight: bold; }
    </style>
</head>
<body class="flex h-screen overflow-hidden">

    <aside class="w-64 bg-white border-r border-slate-200 flex flex-col z-20">
        <div class="p-8 border-b border-slate-50">
            <h1 class="text-xl font-black text-slate-900 flex items-center gap-2 tracking-tighter">⚙️ Admin</h1>
        </div>
        <nav class="flex-1 py-6 flex flex-col gap-1">
            <button onclick="switchTab('export')" id="tab-export" class="tab-btn active flex items-center gap-3 px-6 py-3.5 text-slate-500 hover:bg-slate-50 transition-colors text-left w-full text-sm">📊 데이터 추출 (Export)</button>
            <button onclick="switchTab('rules')" id="tab-rules" class="tab-btn flex items-center gap-3 px-6 py-3.5 text-slate-500 hover:bg-slate-50 transition-colors text-left w-full text-sm">🤖 AI 규칙 관리</button>
            <div class="mt-auto p-6 border-t border-slate-50">
                <a href="index.html" class="text-xs font-bold text-orange-500 hover:underline">← 사용자 화면으로</a>
            </div>
        </nav>
    </aside>

    <main class="flex-1 overflow-y-auto bg-[#f8fafc] relative">
        <div id="toast" class="fixed top-5 left-1/2 -translate-x-1/2 bg-white/80 backdrop-blur-md border border-slate-200 px-6 py-3 rounded-full shadow-lg opacity-0 transition-opacity pointer-events-none z-50 text-sm font-bold">✅ 완료</div>

        <section id="sec-export" class="max-w-4xl mx-auto p-12 space-y-8 block h-full flex flex-col justify-center text-center">
            <div class="bg-white p-12 rounded-[2.5rem] shadow-sm border border-slate-100">
                <div class="w-20 h-20 bg-orange-50 rounded-full flex items-center justify-center mx-auto mb-6">📥</div>
                <h2 class="text-2xl font-black text-slate-900 mb-2 tracking-tight">전체 기록 추출</h2>
                <p class="text-slate-400 mb-10 text-sm">우리집의 모든 기록을 CSV 형식으로 다운로드합니다.</p>
                <button id="btnExport" class="bg-slate-900 hover:bg-slate-800 text-white font-bold py-4 px-12 rounded-2xl transition shadow-xl">CSV 다운로드</button>
                <p id="exportStatus" class="mt-6 text-[10px] font-bold text-slate-300 uppercase"></p>
            </div>
        </section>

        <section id="sec-rules" class="max-w-5xl mx-auto p-12 space-y-8 hidden pb-24">
            <div class="flex justify-between items-end sticky top-0 bg-[#f8fafc]/95 backdrop-blur-sm py-4 z-10 border-b border-slate-100 mb-8">
                <h2 class="text-2xl font-black text-slate-900 tracking-tight">AI 규칙 관리</h2>
                <button id="btnSaveRules" class="bg-orange-600 hover:bg-orange-700 text-white font-bold py-2.5 px-8 rounded-xl transition shadow-lg text-sm">저장하기</button>
            </div>
            <div id="rulesList" class="space-y-4"></div>
            <button onclick="window.admin.addRule()" class="w-full py-4 border-2 border-dashed border-slate-200 rounded-2xl text-slate-400 font-bold hover:bg-white hover:border-orange-200 transition-all text-sm">+ 새 규칙 추가</button>
        </section>
    </main>

    <script type="module" src="admin.js"></script>
    <script>
        window.switchTab = (id) => {
            ['export', 'rules'].forEach(t => {
                document.getElementById('sec-'+t).classList.toggle('hidden', t !== id);
                document.getElementById('tab-'+t).classList.toggle('active', t === id);
            });
        };
    </script>
</body>
</html>
